# cargo-audit configuration
#
# Historical entries below originated from transitive dependencies of the
# former surrealdb stack (since replaced by sqlx) and rmcp 0.5.0 (since
# upgraded to 0.13.0). They are retained as harmless no-ops in case any
# advisory is still reachable transitively.
#
# The active, intentional entry is RUSTSEC-2026-0189 (rmcp 0.13.0), a HIGH
# vulnerability whose fix is a breaking rmcp >=1.4.0 upgrade tracked as its
# own release unit. Its risk is accepted temporarily because this project is
# pre-release and not publicly deployed. Remove that entry when rmcp is upgraded.

[advisories]
ignore = [
    # ── Vulnerabilities (transitive via surrealdb) ───────────────────────────

    # RUSTSEC-2024-0358 — object_store 0.8.0 (low severity 3.8)
    # AWS WebIdentityToken exposure in log files.
    # We never use AWS object storage; pulled in by surrealdb-core.
    "RUSTSEC-2024-0358",

    # RUSTSEC-2025-0009 — ring 0.16.20
    # AES panic with overflow checking.  Transitive via surrealdb-jsonwebtoken.
    "RUSTSEC-2025-0009",

    # RUSTSEC-2023-0071 — rsa 0.9.10 (medium severity 5.9)
    # Marvin Attack timing sidechannel.  No fix available upstream.
    # RSA is only used internally by surrealdb-jsonwebtoken for JWK support.
    "RUSTSEC-2023-0071",

    # ── Unmaintained crate warnings ──────────────────────────────────────────

    # RUSTSEC-2023-0089 — atomic-polyfill 1.0.3 (via surrealdb)
    "RUSTSEC-2023-0089",

    # RUSTSEC-2024-0436 — paste 1.0.15 (via rmcp 0.5.0, compile-time only)
    "RUSTSEC-2024-0436",

    # RUSTSEC-2024-0370 — proc-macro-error 1.0.4 (via surrealdb, compile-time)
    "RUSTSEC-2024-0370",

    # RUSTSEC-2025-0010 — ring 0.16.20 unmaintained (via surrealdb)
    "RUSTSEC-2025-0010",

    # RUSTSEC-2025-0134 — rustls-pemfile 1.0.4 (via surrealdb → reqwest)
    "RUSTSEC-2025-0134",

    # RUSTSEC-2025-0141 — bincode 1.3.3 (via surrealdb, compile-time)
    "RUSTSEC-2025-0141",

    # ── Temporarily accepted (pre-release; not publicly deployed) ────────────

    # RUSTSEC-2026-0189 — rmcp 0.13.0 (HIGH 8.8) DNS rebinding in the Streamable
    # HTTP server transport. Fix requires upgrading rmcp to >=1.4.0, a breaking
    # major bump tracked as a dedicated release unit. Risk accepted temporarily:
    # pre-release, no public deployment. Remove this entry when rmcp is upgraded.
    "RUSTSEC-2026-0189",
]
