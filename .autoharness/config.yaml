# autoharness Configuration
#
# Resolved harness configuration for this workspace.
# Written by autoharness install; updated by autoharness tune.
# Operator edits to this file are preserved on re-install and tuning.
#
# Schema: schemas/harness-config.schema.json

schema_version: "1.0.0"

# Installation preset: starter | standard | full
preset: full

# Additive stack classification used for composition
primary_stack_pack: mcp-server
stack_packs: ["mcp-server", "api-service", "cli-tool"]

# Explicit artifact-class layers selected for installation
install_layers: ["foundation", "instructions", "workflow", "review", "runtime", "backlog", "knowledge", "overlays"]

# Capability packs enabled for this workspace
capability_packs: ["agent-intercom", "agent-engram", "backlogit", "browser-verification", "strict-safety", "adversarial-review"]

# Backlog tool configuration
backlog:
  tool: backlogit
  directory: .backlogit
  suffix_map:
    feature: "F"
    chore: "C"
    task: "T"
    spike: "S"
    deliberation: "DL"
    bug: "B"
    epic: "E"
    subtask: "ST"
    shipment: "SH"

# Long-lived knowledge artifact directories
docs:
  root: docs
  subdirectories:
    compound: compound
    plans: plans
    decisions: decisions
    memory: memory
    closure: closure
    design_docs: design-docs
    product_specs: product-specs

# Optional continuous-learning capability-pack configuration
continuous_learning:
  directory: ".autoharness/continuous-learning"
  capture_hooks: false
  environment_adapter: "none"
  promotion_threshold: 3

# Optional strict-safety capability-pack configuration
strict_safety:
  enabled: true
  require_approval_for:
    - destructive

# Model routing preferences (optional).
# Leave unset here so each developer machine or CI environment can supply its
# own available models and defaults.
model_routing: {}

# AI CLI tool startup configuration
# Resolves copilot in the generated start.ps1 and start.sh scripts.
# Set exe_path to the full path if copilot is not on PATH.
ai_tools:
  copilot_cli:
    exe_path: "copilot"  # Default: "copilot" (expects it on PATH)
                                      # Example: "C:\\Tools\\ghcpcli\\copilot.exe"

# Explicit template variable overrides applied during install/tune (use sparingly —
# prefer fixing the workspace setup over overriding discovery results)
overrides: {}
