schema_version: "1.0.0"
generated_at: "2026-06-28T19:35:44Z"
workspace_path: "D:/Source/GitHub/agent-intercom"

languages:
  primary: "Rust"
  version: "2021"
  secondary:
    - "TypeScript"
    - "PowerShell"

frameworks:
  list:
    - "axum 0.8"
    - "rmcp 0.13"
    - "slack-morphism 2.17"
    - "sqlx 0.8"
    - "tokio 1.37"
  mcp_sdk: "rmcp"
  mcp_transport: "streamable-http"

primary_stack_pack: "mcp-server"
stack_packs:
  - "mcp-server"
  - "api-service"
  - "cli-tool"

build:
  tool: "cargo"
  command: "cargo build"
  check_command: "cargo check --all-targets"

test:
  runner: "cargo test"
  command: "cargo test"
  directory: "tests/"

lint:
  tool: "clippy"
  command: "cargo clippy --all-targets -- -D warnings -D clippy::pedantic"

format:
  tool: "rustfmt"
  command: "cargo fmt --all"
  check_command: "cargo fmt --all -- --check"
  fix_command: "cargo fmt --all"

ci:
  platform: "GitHub Actions"
  pipeline_steps:
    - "checkout"
    - "install-toolchain"
    - "cargo-cache"
    - "fmt-check"
    - "clippy"
    - "test-unit-contract"
    - "test-integration"
    - "cargo-audit"
  quality_gates:
    - "cargo fmt --all -- --check"
    - "cargo clippy --all-targets -- -D warnings -D clippy::pedantic"
    - "cargo test"
    - "cargo audit"
  notes: "GitHub Actions CI with lint → test-unit → test-integration → audit pipeline. Concurrency cancel-in-progress enabled."

structure:
  source_layout: "src/"
  test_layout: "tests/ (unit/, contract/, integration/ tiers)"
  doc_layout: "docs/"

runtime_surfaces:
  web_ui: false
  public_api: true
  background_jobs: true
  browser_tooling:
    - "playwright"
  deployment_manifests: []

strict_safety_signals:
  - "Public API surface at /mcp endpoint"
  - "Security-sensitive credential handling via keyring crate"
  - "Path traversal protection in diff/path_safety.rs"
  - "SQLite schema management in persistence/schema.rs"
  - "Session-bound authorization guard in slack/events.rs"

release_observability_signals:
  - "Public API runtime surface (MCP HTTP transport)"
  - "Background job surfaces (stall detection, child monitoring, Slack Socket Mode)"
  - "CI/CD pipeline with lint, test, and audit gates"

conventions:
  code_style:
    formatter: "rustfmt"
    formatter_config: "rustfmt.toml (max_width=100, edition=2021)"
    linter: "clippy"
    linter_strictness: "pedantic deny, unwrap_used deny, expect_used deny"
    unsafe_policy: "#![forbid(unsafe_code)]"
    visibility_default: "pub(crate)"
    error_pattern: "Result<T, AppError>"
    doc_comment_style: "/// doc comments on all public items"
  git:
    commit_style: "conventional commits (feat:, fix:, docs:, test:)"
    branch_strategy: "branch per feature"
    pr_template: false
    issue_templates: false
  documentation:
    api_docs: "rustdoc"
    adrs: "docs/adrs/ (numbered 0001-0013)"
    changelog: false
    readme: true

